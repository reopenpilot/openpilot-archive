name: "Update PR Target Branch"

on:
  push:
    branches:
      - FrogPilot-Testing
  workflow_dispatch:

permissions:
  contents: write

env:
  BRANCH_PR_TARGET: ${{ vars.BRANCH_PR_TARGET }}
  GIT_EMAIL: ${{ vars.GIT_EMAIL }}
  GIT_NAME: ${{ vars.GIT_NAME }}
  SOURCE_BRANCH: FrogPilot-Testing

concurrency:
  group: update-pr-branch

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - run: |
          set -euo pipefail
          export TZ=America/Phoenix

          : "${BRANCH_PR_TARGET:?BRANCH_PR_TARGET is required}"
          : "${GIT_EMAIL:?GIT_EMAIL is required}"
          : "${GIT_NAME:?GIT_NAME is required}"

          [ "$SOURCE_BRANCH" != "$BRANCH_PR_TARGET" ] || { echo "BRANCH_PR_TARGET must differ from SOURCE_BRANCH." >&2; exit 1; }

          git fetch origin \
            "+refs/heads/$SOURCE_BRANCH:refs/remotes/origin/$SOURCE_BRANCH" \
            "+refs/heads/$BRANCH_PR_TARGET:refs/remotes/origin/$BRANCH_PR_TARGET"

          source_ref="origin/$SOURCE_BRANCH"
          target_ref="origin/$BRANCH_PR_TARGET"

          git switch --detach "$source_ref"

          compile_commit="$(git log --first-parent --format='%H%x09%s' HEAD | awk -F'\t' '$2 == "Compile FrogPilot" { print $1; exit }')"
          if [ -n "$compile_commit" ]; then
            git revert --no-commit "$compile_commit"
          fi

          source_tree="$(git write-tree)"
          target_tree="$(git rev-parse "$target_ref^{tree}")"

          if [ "$source_tree" = "$target_tree" ]; then
            echo "$BRANCH_PR_TARGET already matches $SOURCE_BRANCH."
            exit 0
          fi

          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"

          now="$(date +%s)"
          day="$(date -d "@$now" +%-d)"
          case "$day" in
            1|21|31) suffix="st" ;;
            2|22) suffix="nd" ;;
            3|23) suffix="rd" ;;
            *) suffix="th" ;;
          esac

          message="$(date -d "@$now" "+%B ${day}${suffix}, %Y Update")"
          parent="$target_ref"
          if [ "$(git log -1 --format=%s "$target_ref")" = "$message" ]; then
            parent="$target_ref^"
          fi

          commit="$(git commit-tree "$source_tree" -p "$parent" -m "$message")"

          git push --force-with-lease origin "$commit:refs/heads/$BRANCH_PR_TARGET"
